<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>專業口碑發文管理與企劃系統</title>
  
  <!-- 載入 Tailwind CSS 樣式庫 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 Babel 編譯器 (讓瀏覽器能直接讀懂 React JSX 語法) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* 自訂卷軸樣式，讓畫面更精美 */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">
  
  <!-- React 應用程式的掛載點 -->
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    // 直接從 CDN 匯入 React 與 ReactDOM
    import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    
    // 匯入所有的 Lucide 圖示 (加入 ?deps=react@18.2.0 強制綁定版本，解決白畫面衝突)
    import { 
      Save, FileText, Calendar, Hash, Type, 
      Trash2, Edit, Plus, Wand2, Loader2, AlertCircle, CheckCircle2, Check,
      FolderOpen, Folder, MessageCircle, Eye, X, ThumbsUp, Share2, Bookmark, MoreHorizontal, Sparkles, AlertTriangle, BookOpen
    } from 'https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0';

    function App() {
      // 專案與子資料夾結構 (主專案 -> 子資料夾/階段)
      const [projects, setProjects] = useState({
        '預設專案': ['預設子資料夾'],
        '夏季保養品推廣': ['第一階段 6月', '第二階段 7月'],
        '美食開箱': ['第一階段']
      });
      const [newProjectName, setNewProjectName] = useState('');
      const [newPhaseName, setNewPhaseName] = useState('');
      
      const [selectedProject, setSelectedProject] = useState('全部');
      const [selectedPhase, setSelectedPhase] = useState('全部');

      // 專案筆記本狀態
      const [projectNotes, setProjectNotes] = useState({});
      const [showNotebook, setShowNotebook] = useState(false);

      // 系統自訂彈跳視窗狀態 (取代系統原生 confirm / alert)
      const [dialog, setDialog] = useState({
        isOpen: false,
        type: 'alert', // 'alert' 或是 'confirm'
        title: '',
        message: '',
        onConfirm: null
      });

      // 表單狀態
      const [form, setForm] = useState({
        id: null,
        project: '預設專案',
        phase: '預設子資料夾',
        month: '', 
        publishDate: '', 
        articleNo: '',
        title: '',
        platform: 'Dcard', 
        board: '', 
        content: '',
        plan: '', 
        comments: [{ text: '' }]
      });

      // 批量留言狀態
      const [batchComments, setBatchComments] = useState('');
      const [showBatchInput, setShowBatchInput] = useState(false);

      // 儲存的文案列表
      const [posts, setPosts] = useState([]);
      
      // UI 狀態
      const [isChecking, setIsChecking] = useState(false);
      const [isGeneratingPlan, setIsGeneratingPlan] = useState(false);
      const [isGeneratingTitle, setIsGeneratingTitle] = useState(false);
      const [typos, setTypos] = useState(null);
      const [checkError, setCheckError] = useState('');
      const [showPreview, setShowPreview] = useState(false);

      const textareaRef = useRef(null);
      const planTextareaRef = useRef(null);

      // 自動調整內文輸入框高度
      useEffect(() => {
        if (textareaRef.current) {
          textareaRef.current.style.height = 'auto';
          textareaRef.current.style.height = `${Math.max(150, textareaRef.current.scrollHeight)}px`;
        }
      }, [form.content]);

      // 自動調整企劃輸入框高度
      useEffect(() => {
        if (planTextareaRef.current) {
          planTextareaRef.current.style.height = 'auto';
          planTextareaRef.current.style.height = `${Math.max(100, planTextareaRef.current.scrollHeight)}px`;
        }
      }, [form.plan]);

      // 顯示對話框 Helper
      const showDialog = (type, title, message, onConfirm = null) => {
        setDialog({ isOpen: true, type, title, message, onConfirm });
      };

      const closeDialog = () => {
        setDialog({ ...dialog, isOpen: false });
      };

      const handleChange = (e) => {
        const { name, value } = e.target;
        setForm(prev => ({ ...prev, [name]: value }));
        if (name === 'content' && typos !== null) {
          setTypos(null);
          setCheckError('');
        }
      };

      const handleProjectChange = (e) => {
        const newProj = e.target.value;
        setForm(prev => ({
          ...prev,
          project: newProj,
          phase: projects[newProj]?.[0] || ''
        }));
      };

      const handleCommentChange = (index, value) => {
        const newComments = [...form.comments];
        newComments[index].text = value;
        setForm(prev => ({ ...prev, comments: newComments }));
      };

      const addCommentField = () => {
        setForm(prev => ({ ...prev, comments: [...prev.comments, { text: '' }] }));
      };

      const removeCommentField = (index) => {
        const newComments = form.comments.filter((_, i) => i !== index);
        setForm(prev => ({ ...prev, comments: newComments.length ? newComments : [{ text: '' }] }));
      };

      // 批量新增留言
      const applyBatchComments = () => {
        const lines = batchComments.split('\n').map(l => l.trim()).filter(l => l);
        if (lines.length > 0) {
          const newComments = lines.map(l => ({ text: l }));
          const currentFiltered = form.comments.filter(c => c.text.trim());
          setForm(prev => ({ ...prev, comments: [...currentFiltered, ...newComments] }));
        }
        setBatchComments('');
        setShowBatchInput(false);
      };

      // 資料夾處理 (新增/刪除專案與子階段)
      const addProject = () => {
        const name = newProjectName.trim();
        if (name && !projects[name]) {
          setProjects(prev => ({ ...prev, [name]: ['預設子資料夾'] }));
          setForm(prev => ({ ...prev, project: name, phase: '預設子資料夾' }));
          setNewProjectName('');
        }
      };

      const deleteProject = (projectName) => {
        if (projectName === '預設專案') {
          showDialog('alert', '操作錯誤', '「預設專案」為系統預設，無法刪除！');
          return;
        }
        
        showDialog('confirm', '刪除專案確認', `確定要刪除主專案「${projectName}」嗎？\n這將會同步刪除該專案底下的所有文案！`, () => {
          const newProjects = { ...projects };
          delete newProjects[projectName];
          setProjects(newProjects);
          
          // 同步刪除關聯的文案
          setPosts(prev => prev.filter(p => p.project !== projectName));
          
          // 同步刪除專案筆記
          const newNotes = { ...projectNotes };
          delete newNotes[projectName];
          setProjectNotes(newNotes);

          if (form.project === projectName) {
            setForm(prev => ({ ...prev, project: '預設專案', phase: projects['預設專案'][0] }));
          }
          if (selectedProject === projectName) {
            setSelectedProject('全部');
            setSelectedPhase('全部');
          }
        });
      };

      const addPhase = () => {
        const phase = newPhaseName.trim();
        if (phase && form.project && !projects[form.project].includes(phase)) {
          setProjects(prev => ({
            ...prev,
            [form.project]: [...prev[form.project], phase]
          }));
          setForm(prev => ({ ...prev, phase: phase }));
          setNewPhaseName('');
        }
      };

      const deletePhase = (projectName, phaseName) => {
        if (projectName === '預設專案' && phaseName === '預設子資料夾') {
          showDialog('alert', '操作錯誤', '「預設子資料夾」無法刪除！');
          return;
        }
        if (projects[projectName].length <= 1) {
          showDialog('alert', '操作錯誤', '每個主專案至少需要保留一個子資料夾！');
          return;
        }

        showDialog('confirm', '刪除階段確認', `確定要刪除「${projectName} - ${phaseName}」嗎？\n內部所有相關聯的文案都會被刪除！`, () => {
          setProjects(prev => ({
            ...prev,
            [projectName]: prev[projectName].filter(p => p !== phaseName)
          }));
          
          // 同步刪除關聯的文案
          setPosts(prev => prev.filter(p => !(p.project === projectName && p.phase === phaseName)));
          
          if (form.project === projectName && form.phase === phaseName) {
            setForm(prev => ({ ...prev, phase: projects[projectName].filter(p => p !== phaseName)[0] }));
          }
          if (selectedProject === projectName && selectedPhase === phaseName) {
            setSelectedPhase('全部');
          }
        });
      };

      const calculatePureLength = (str) => {
        if (!str) return 0;
        return str.replace(/[\p{P}\p{S}\s]/gu, '').length;
      };

      const pureCount = calculatePureLength(form.content);

      const handleSave = () => {
        if (!form.content.trim()) {
          showDialog('alert', '無法儲存', '文案內容不能為空！');
          return;
        }
        
        const cleanComments = form.comments.filter(c => c.text.trim() !== '');
        const postData = { ...form, comments: cleanComments.length ? cleanComments : [{ text: '' }] };

        if (form.id) {
          setPosts(posts.map(p => p.id === form.id ? postData : p));
        } else {
          const newPost = { ...postData, id: Date.now() };
          setPosts([newPost, ...posts]);
        }
        handleClear();
      };

      const handleClear = () => {
        const defaultProj = selectedProject === '全部' ? '預設專案' : selectedProject;
        const defaultPhase = selectedPhase === '全部' ? projects[defaultProj][0] : selectedPhase;

        setForm({
          id: null,
          project: defaultProj,
          phase: defaultPhase,
          month: '',
          publishDate: '',
          articleNo: '',
          title: '',
          platform: 'Dcard',
          board: '',
          content: '',
          plan: '',
          comments: [{ text: '' }]
        });
        setTypos(null);
      };

      const handleEdit = (post) => {
        setForm(post);
        setTypos(null);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleDelete = (id) => {
        showDialog('confirm', '刪除文案', '確定要刪除這篇文案嗎？', () => {
          setPosts(posts.filter(p => p.id !== id));
          if (form.id === id) handleClear();
        });
      };

      const fetchWithBackoff = async (url, options, maxRetries = 5) => {
        const delays = [1000, 2000, 4000, 8000, 16000];
        for (let i = 0; i < maxRetries; i++) {
          try {
            const response = await fetch(url, options);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return await response.json();
          } catch (error) {
            if (i === maxRetries - 1) throw error;
            await new Promise(resolve => setTimeout(resolve, delays[i]));
          }
        }
      };

      const runTypoCheck = async () => {
        if (pureCount === 0) return;
        setIsChecking(true);
        setTypos(null);
        setCheckError('');

        try {
          const apiKey = ""; // 使用你自有的 API KEY 或環境變數
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
          const prompt = `請檢查以下文字的錯別字與不順暢處。回傳JSON格式: {"typos": [{"wrong": "錯字", "correct": "正字", "reason": "原因"}]}。若無錯字回傳 {"typos": []}。\n文字:\n${form.content}`;

          const data = await fetchWithBackoff(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              generationConfig: { responseMimeType: "application/json" }
            })
          });

          const parsed = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text || '{"typos":[]}');
          setTypos(parsed.typos || []);
        } catch (error) {
          setCheckError("AI 檢查暫時無法連線，請稍後再試。");
        } finally {
          setIsChecking(false);
        }
      };

      const applyFix = (wrong, correct, index) => {
        setForm(prev => ({ ...prev, content: prev.content.replace(wrong, correct) }));
        setTypos(prevTypos => prevTypos.filter((_, i) => i !== index));
      };

      const generatePlan = async () => {
        if (!form.content.trim()) {
          showDialog('alert', '生成失敗', '請先填寫文案內容，AI 才能幫你生成企劃！');
          return;
        }
        
        setIsGeneratingPlan(true);

        try {
          const apiKey = ""; // 使用你自有的 API KEY 或環境變數
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

          const promptText = `
            請你閱讀以下的「口碑文案」與「預設留言」，幫我整理成「客戶看得懂的新版寫作方向」。
            請嚴格遵守以下格式，不需要額外的問候語，字數請精簡在100字以內。每點內容簡明扼要，但要有完整邏輯。

            格式為：
            1. 主文方向
            a.
            b.
            c.
            
            2. 回文方向
            >>

            文案標題：${form.title}
            文案內容：
            ${form.content}
            
            預設留言/回文：
            ${form.comments.map((c, i) => `樓層${i+1}: ${c.text}`).join('\n')}
          `;

          const data = await fetchWithBackoff(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: promptText }] }],
            })
          });

          const generatedPlan = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
          setForm(prev => ({ ...prev, plan: generatedPlan.trim() }));
          
        } catch (error) {
          showDialog('alert', '生成失敗', 'AI 生成企劃失敗，請稍後再試。');
          console.error(error);
        } finally {
          setIsGeneratingPlan(false);
        }
      };

      const generateTitleAndBoard = async () => {
        if (!form.content.trim()) {
          showDialog('alert', '操作提示', '請先填寫下方的「文案內容」，AI 才能幫你構思合適的標題與版別喔！');
          return;
        }
        
        setIsGeneratingTitle(true);

        try {
          const apiKey = ""; // 使用你自有的 API KEY 或環境變數
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

          const promptText = `
            你是一個專業的社群口碑行銷專家。請根據以下的「文案內容」與使用者指定的「發布平台」，幫我生成一個最吸睛、符合該平台生態的「發文標題」，以及最適合發布的「版別/討論區」。
            請嚴格以 JSON 格式回傳，不要有其他廢話：
            {"title": "生成的標題", "board": "建議的版別"}

            發布平台：${form.platform}
            文案內容：
            ${form.content}
          `;

          const data = await fetchWithBackoff(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: promptText }] }],
              generationConfig: { responseMimeType: "application/json" }
            })
          });

          const jsonText = data.candidates?.[0]?.content?.parts?.[0]?.text || '{"title":"","board":""}';
          const parsed = JSON.parse(jsonText);
          
          setForm(prev => ({ 
            ...prev, 
            title: parsed.title || prev.title,
            board: parsed.board || prev.board
          }));
          
        } catch (error) {
          showDialog('alert', '生成失敗', 'AI 生成標題失敗，請稍後再試。');
          console.error(error);
        } finally {
          setIsGeneratingTitle(false);
        }
      };

      // 自訂精美彈跳視窗組件
      const CustomDialog = () => {
        if (!dialog.isOpen) return null;
        return (
          <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
            <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden transform scale-100 transition-transform">
              <div className={`p-4 border-b ${dialog.type === 'confirm' ? 'bg-red-50 border-red-100' : 'bg-blue-50 border-blue-100'} flex items-center gap-3`}>
                {dialog.type === 'confirm' ? <AlertTriangle className="text-red-600" /> : <AlertCircle className="text-blue-600" />}
                <h3 className="text-lg font-bold text-slate-800">{dialog.title}</h3>
              </div>
              <div className="p-5">
                <p className="text-slate-600 leading-relaxed whitespace-pre-wrap">{dialog.message}</p>
              </div>
              <div className="p-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-3">
                {dialog.type === 'confirm' && (
                  <button
                    onClick={closeDialog}
                    className="px-5 py-2 rounded-xl font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-100 transition-colors"
                  >
                    取消
                  </button>
                )}
                <button
                  onClick={() => {
                    if (dialog.onConfirm) dialog.onConfirm();
                    closeDialog();
                  }}
                  className={`px-5 py-2 rounded-xl font-bold text-white shadow-sm transition-colors ${
                    dialog.type === 'confirm' ? 'bg-red-600 hover:bg-red-700 shadow-red-600/20' : 'bg-blue-600 hover:bg-blue-700 shadow-blue-600/20'
                  }`}
                >
                  {dialog.type === 'confirm' ? '確定刪除' : '我知道了'}
                </button>
              </div>
            </div>
          </div>
        );
      };

      // 專案筆記本彈跳視窗
      const NotebookModal = () => {
        if (!showNotebook || selectedProject === '全部') return null;
        return (
          <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[90] flex items-center justify-center p-4">
            <div className="bg-white rounded-2xl w-full max-w-2xl h-[70vh] flex flex-col shadow-2xl overflow-hidden transform scale-100 transition-transform">
              <div className="p-4 border-b bg-amber-50 flex items-center justify-between">
                <h3 className="text-lg font-bold text-amber-900 flex items-center gap-2">
                  <BookOpen className="text-amber-600" />
                  「{selectedProject}」專案筆記本
                </h3>
                <button onClick={() => setShowNotebook(false)} className="text-amber-700 hover:bg-amber-200 p-1.5 rounded-full transition-colors">
                  <X size={20} />
                </button>
              </div>
              <div className="flex-1 p-4 bg-slate-50">
                <textarea
                  value={projectNotes[selectedProject] || ''}
                  onChange={(e) => setProjectNotes({...projectNotes, [selectedProject]: e.target.value})}
                  placeholder="在這裡記錄這個專案的專屬資訊...&#10;例如：&#10;- 客戶要求與目標受眾&#10;- 核心產品賣點&#10;- 禁忌詞彙或不能提到的競品&#10;- 行銷走期規劃..."
                  className="w-full h-full p-4 border border-amber-200 rounded-xl focus:ring-2 focus:ring-amber-500 focus:outline-none resize-none custom-scrollbar text-slate-700 leading-relaxed text-[15px]"
                />
              </div>
              <div className="p-4 border-t border-amber-100 bg-white flex justify-between items-center">
                <span className="text-xs text-slate-400">💡 內容會自動隨打即存</span>
                <button onClick={() => setShowNotebook(false)} className="px-6 py-2 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-xl shadow-sm transition-colors flex items-center gap-2">
                  <Check size={18} /> 完成並關閉
                </button>
              </div>
            </div>
          </div>
        );
      };

      const PreviewModal = () => {
        if (!showPreview) return null;

        const renderPlatformUI = () => {
          if (form.platform === 'Dcard') {
            return (
              <div className="bg-[#006aa6] min-h-full p-4 font-sans selection:bg-blue-300">
                <div className="max-w-2xl mx-auto bg-white rounded-lg shadow-md overflow-hidden mt-4">
                  <div className="p-5 pb-2">
                    <div className="flex items-center gap-3 mb-3">
                      <div className="w-10 h-10 bg-[#006aa6] rounded-full flex items-center justify-center text-white font-bold text-lg">
                        {form.board ? form.board.charAt(0) : '匿'}
                      </div>
                      <div>
                        <p className="font-bold text-[#333] text-[15px]">{form.board || '匿名版'} • 匿名</p>
                        <p className="text-gray-400 text-xs">{form.publishDate ? form.publishDate : '剛剛'}</p>
                      </div>
                    </div>
                    <h1 className="text-2xl font-bold text-black mb-4 leading-snug">{form.title || '（無標題）'}</h1>
                    <div className="text-[15px] text-[#333] leading-relaxed whitespace-pre-wrap break-words">
                      {form.content}
                    </div>
                  </div>
                  <div className="flex items-center px-5 py-3 border-t border-gray-100 mt-6 gap-6 text-gray-500">
                    <div className="flex items-center gap-1.5"><ThumbsUp size={20} className="text-pink-500" /> <span>0</span></div>
                    <div className="flex items-center gap-1.5"><MessageCircle size={20} /> <span>{form.comments.filter(c=>c.text).length}</span></div>
                    <div className="flex items-center gap-1.5"><Bookmark size={20} /> <span>收藏</span></div>
                  </div>
                  <div className="bg-gray-50 p-5">
                    <div className="text-sm text-gray-500 mb-4">共 {form.comments.filter(c=>c.text).length} 則留言</div>
                    {form.comments.filter(c => c.text).map((comment, idx) => (
                      <div key={idx} className="flex gap-3 mb-4">
                        <div className="w-8 h-8 rounded-full bg-gray-300 flex-shrink-0"></div>
                        <div className="bg-white p-3 rounded-2xl rounded-tl-sm shadow-sm flex-1 text-[14px]">
                          <span className="font-bold text-gray-700 block mb-1">B{idx + 1}</span>
                          {comment.text}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          }

          if (form.platform === 'Threads') {

                            <div 
                              onClick={(e) => { e.stopPropagation(); deletePhase(selectedProject, phaseName); }}
                              className={`ml-1 p-0.5 rounded-full transition-colors cursor-pointer ${selectedPhase === phaseName ? 'text-purple-300 hover:text-red-400 hover:bg-purple-800' : 'text-slate-500 hover:text-red-400 hover:bg-slate-600'}`}
                              title="刪除此階段"
                            >
                              <X size={12} />
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  )}

                  {/* 專案筆記本入口按鈕 (僅在選擇特定主專案時顯示) */}
                  {selectedProject !== '全部' && (
                    <div className="px-3 py-2 bg-slate-800/80 border-b border-slate-700 flex justify-between items-center">
                      <span className="text-xs text-slate-400 font-medium tracking-wider">專案工具</span>
                      <button
                        onClick={() => setShowNotebook(true)}
                        className="flex items-center gap-1.5 text-xs font-bold bg-amber-500/10 hover:bg-amber-500/25 text-amber-400 px-3 py-1.5 rounded-lg transition-colors border border-amber-500/30"
                      >
                        <BookOpen size={14} /> 開啟專案筆記本
                      </button>
                    </div>
                  )}
                </div>

                <div className="p-4 flex-1 overflow-y-auto custom-scrollbar">
                  {posts.filter(p => (selectedProject === '全部' || p.project === selectedProject) && (selectedPhase === '全部' || p.phase === selectedPhase)).length === 0 ? (
                    <div className="text-center text-slate-500 py-10 mt-10">
                      <FolderOpen size={40} className="mx-auto mb-2 opacity-50" />
                      <p>此分類目前沒有文案</p>
                    </div>
                  ) : (
                    <div className="space-y-3">
                      {posts.filter(p => (selectedProject === '全部' || p.project === selectedProject) && (selectedPhase === '全部' || p.phase === selectedPhase)).map(post => (
                        <div key={post.id} className="bg-slate-700 border border-slate-600 rounded-lg p-3 hover:border-blue-500 transition-colors cursor-pointer" onClick={() => handleEdit(post)}>
                          <div className="flex justify-between items-start mb-1">
                            <span className={`text-[11px] px-2 py-0.5 rounded font-bold ${
                              post.platform === 'Dcard' ? 'bg-blue-900 text-blue-200' : 
                              post.platform === 'Mobile01' ? 'bg-green-900 text-green-200' : 
                              'bg-gray-900 text-gray-200'
                            }`}>
                              {post.platform}
                            </span>
                            <div onClick={(e) => { e.stopPropagation(); handleDelete(post.id); }} className="text-slate-400 hover:text-red-400 p-1 cursor-pointer"><Trash2 size={14} /></div>
                          </div>
                          
                          <h4 className="font-bold text-white text-sm mb-1 line-clamp-1">{post.title || '無標題'}</h4>
                          
                          <div className="flex flex-wrap gap-x-2 gap-y-1 text-[11px] text-slate-300 mb-2">
                            {post.project && <span className="bg-slate-600 px-1.5 py-0.5 rounded text-blue-300">{post.project}</span>}
                            {post.phase && <span className="bg-slate-600 px-1.5 py-0.5 rounded text-purple-300">{post.phase}</span>}
                          </div>

                          <div className="flex flex-wrap gap-x-3 gap-y-1 text-xs text-slate-400 mb-2">
                            {post.publishDate && <span>發布: {post.publishDate}</span>}
                            {post.board && <span>版別: {post.board}</span>}
                          </div>
                          
                          <p className="text-slate-300 text-xs line-clamp-2 opacity-80 bg-slate-800 p-2 rounded mb-2">
                            {post.content}
                          </p>
                          
                          {post.plan && (
                             <div className="text-[10px] text-amber-400 bg-amber-900/30 px-2 py-1 rounded inline-flex items-center gap-1">
                               <Sparkles size={10} /> 已包含企劃
                             </div>
                          )}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>

          </div>
        </div>
      );
    }

    // 啟動 React
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
