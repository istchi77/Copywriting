<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>專業口碑文案與企劃系統</title>
  
  <!-- 載入 React, ReactDOM, Babel -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* 自訂捲軸樣式 */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { 
      Save, Trash2, Edit, Plus, Wand2, Loader2, FileText, CheckCircle,
      FolderOpen, Folder, X, AlertCircle, Sparkles, LayoutList
    } from 'https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0';

    const { useState, useEffect, useRef } = React;

    function App() {
      // ⚠️ 你的 API KEY
      const GEMINI_API_KEY = "AQ.Ab8RN6Ju79VIIgQRXM5RDquZty-GykCEnORglVRmA44BiRTeyw";

      // 專案與子資料夾結構 (主專案 -> 子資料夾/階段)
      const [projects, setProjects] = useState(() => {
        try {
          const saved = localStorage.getItem('copywriting_projects');
          return saved ? JSON.parse(saved) : {
            '預設專案': ['預設子資料夾'],
            '夏季保養品推廣': ['第一階段 6月', '第二階段 7月']
          };
        } catch (e) {
          return { '預設專案': ['預設子資料夾'] };
        }
      });

      const [newProjectName, setNewProjectName] = useState('');
      const [newPhaseName, setNewPhaseName] = useState('');
      
      const [selectedProject, setSelectedProject] = useState('全部');
      const [selectedPhase, setSelectedPhase] = useState('全部');

      // 基礎表單狀態
      const [form, setForm] = useState({
        id: null,
        project: '預設專案',
        phase: '預設子資料夾',
        month: '', 
        publishDate: '', 
        articleNo: '',
        title: '',
        platform: 'Dcard', 
        board: '', 
        content: '',
        comments: '', 
        plan: ''
      });

      // 儲存的文案
      const [posts, setPosts] = useState(() => {
        try {
          const saved = localStorage.getItem('copywriting_posts');
          return saved ? JSON.parse(saved) : [];
        } catch (e) {
          return [];
        }
      });
      
      // UI 載入與錯誤狀態
      const [loadingType, setLoadingType] = useState(''); // 'title', 'typo', 'plan'
      const [typos, setTypos] = useState(null);
      const [checkError, setCheckError] = useState('');

      const textareaRef = useRef(null);
      const planTextareaRef = useRef(null);

      // 自動調整高度
      useEffect(() => {
        if (textareaRef.current) {
          textareaRef.current.style.height = 'auto';
          textareaRef.current.style.height = `${Math.max(150, textareaRef.current.scrollHeight)}px`;
        }
      }, [form.content]);

      useEffect(() => {
        if (planTextareaRef.current) {
          planTextareaRef.current.style.height = 'auto';
          planTextareaRef.current.style.height = `${Math.max(100, planTextareaRef.current.scrollHeight)}px`;
        }
      }, [form.plan]);

      // 資料變更時自動儲存
      useEffect(() => {
        localStorage.setItem('copywriting_projects', JSON.stringify(projects));
      }, [projects]);

      useEffect(() => {
        localStorage.setItem('copywriting_posts', JSON.stringify(posts));
      }, [posts]);

      // 共用 AI 呼叫函數
      const callAI = async (prompt, isJson = false) => {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`;
        const payload = {
          contents: [{ parts: [{ text: prompt }] }]
        };
        
        if (isJson) {
          payload.generationConfig = { responseMimeType: "application/json" };
        }

        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error("API 連線失敗，請檢查金鑰。");
        
        const data = await res.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
        
        if (!text) throw new Error("AI 回傳空白。");

        if (isJson) {
          const cleanedText = text.replace(/```json/gi, '').replace(/```/g, '').trim();
          return JSON.parse(cleanedText);
        }
        return text;
      };

      // 計算字數
      const pureCount = (form.content || '').replace(/[\p{P}\p{S}\s]/gu, '').length;

      // 1. AI 標題與版別生成
      const handleGenerateTitle = async () => {
        if (!form.content.trim()) return alert("請先填寫文案內容！");
        setLoadingType('title');
        try {
          const prompt = `你是一個口碑行銷專家。請根據以下「文案內容」與平台「${form.platform}」，生成一個吸睛標題和適合發布的版別。
          請務必回傳 JSON 格式：{"title": "生成的標題", "board": "推薦版別"}`;
          const result = await callAI(prompt, true);
          setForm(prev => ({ ...prev, title: result.title || '', board: result.board || '' }));
        } catch (error) {
          alert("標題生成失敗：" + error.message);
        } finally {
          setLoadingType('');
        }
      };

      // 2. AI 錯字檢查
      const handleTypoCheck = async () => {
        if (!form.content.trim()) return alert("請先填寫文案內容！");
        setLoadingType('typo');
        setTypos(null);
        setCheckError('');
        try {
          const prompt = `請檢查以下文字的錯別字與不順暢處。回傳JSON格式: {"typos": [{"wrong": "錯字", "correct": "正字", "reason": "原因"}]}。若無錯字回傳 {"typos": []}。\n文字:\n${form.content}`;
          const result = await callAI(prompt, true);
          setTypos(result.typos || []);
        } catch (error) {
          setCheckError("檢查錯字失敗：" + error.message);
        } finally {
          setLoadingType('');
        }
      };

      // 3. AI 生成企劃
      const handleGeneratePlan = async () => {
        if (!form.content.trim()) return alert("請先填寫文案內容！");
        setLoadingType('plan');
        try {
          const prompt = `請閱讀以下文案與預設留言，整理成客戶看的「寫作方向」。
          格式如下 (限 100 字內，簡明扼要)：
          1. 主文方向
          a.
          b.
          c.
          
          2. 回文方向
          >>
          
          標題：${form.title}
          文案：${form.content}
          預設留言：${form.comments}`;
          
          const result = await callAI(prompt, false);
          setForm(prev => ({ ...prev, plan: result.trim() }));
        } catch (error) {
          alert("企劃生成失敗：" + error.message);
        } finally {
          setLoadingType('');
        }
      };

      // 套用錯字修改
      const applyFix = (wrong, correct, index) => {
        setForm(prev => ({ ...prev, content: prev.content.replace(wrong, correct) }));
        setTypos(prevTypos => prevTypos.filter((_, i) => i !== index));
      };

      // --- 資料夾操作 ---
      const handleProjectChange = (e) => {
        const newProj = e.target.value;
        setForm(prev => ({
          ...prev,
          project: newProj,
          phase: projects[newProj]?.[0] || ''
        }));
      };

      const addProject = () => {
        const name = newProjectName.trim();
        if (name && !projects[name]) {
          setProjects(prev => ({ ...prev, [name]: ['預設子資料夾'] }));
          setForm(prev => ({ ...prev, project: name, phase: '預設子資料夾' }));
          setNewProjectName('');
        }
      };

      const deleteProject = (projectName) => {
        if (projectName === '預設專案') return alert('「預設專案」無法刪除！');
        if (window.confirm(`確定要刪除主專案「${projectName}」嗎？\n這將會同步刪除該專案底下的所有文案！`)) {
          const newProjects = { ...projects };
          delete newProjects[projectName];
          setProjects(newProjects);
          setPosts(prev => prev.filter(p => p.project !== projectName));
          if (form.project === projectName) {
            setForm(prev => ({ ...prev, project: '預設專案', phase: projects['預設專案'][0] }));
          }
          if (selectedProject === projectName) {
            setSelectedProject('全部');
            setSelectedPhase('全部');
          }
        }
      };

      const addPhase = () => {
        const phase = newPhaseName.trim();
        if (phase && form.project && !projects[form.project].includes(phase)) {
          setProjects(prev => ({ ...prev, [form.project]: [...prev[form.project], phase] }));
          setForm(prev => ({ ...prev, phase: phase }));
          setNewPhaseName('');
        }
      };

      const deletePhase = (projectName, phaseName) => {
        if (projectName === '預設專案' && phaseName === '預設子資料夾') return alert('無法刪除！');
        if (projects[projectName].length <= 1) return alert('每個專案至少需保留一個階段！');
        
        if (window.confirm(`確定要刪除「${projectName} - ${phaseName}」嗎？\n內部相關文案都會被刪除！`)) {
          setProjects(prev => ({ ...prev, [projectName]: prev[projectName].filter(p => p !== phaseName) }));
          setPosts(prev => prev.filter(p => !(p.project === projectName && p.phase === phaseName)));
          if (form.project === projectName && form.phase === phaseName) {
            setForm(prev => ({ ...prev, phase: projects[projectName].filter(p => p !== phaseName)[0] }));
          }
          if (selectedProject === projectName && selectedPhase === phaseName) {
            setSelectedPhase('全部');
          }
        }
      };

      // 儲存與清除
      const handleSave = () => {
        if (!form.content.trim()) return alert("內容不能為空！");
        if (form.id) {
          setPosts(posts.map(p => p.id === form.id ? form : p));
        } else {
          setPosts([{ ...form, id: Date.now() }, ...posts]);
        }
        alert("已成功儲存！");
        handleClear();
      };

      const handleClear = () => {
        const defaultProj = selectedProject === '全部' ? '預設專案' : selectedProject;
        const defaultPhase = selectedPhase === '全部' ? projects[defaultProj][0] : selectedPhase;
        
        setForm({ 
          id: null, project: defaultProj, phase: defaultPhase, 
          month: '', publishDate: '', articleNo: '', title: '', platform: 'Dcard', board: '', content: '', comments: '', plan: '' 
        });
        setTypos(null);
        setCheckError('');
      };

      const handleDelete = (id, e) => {
        e.stopPropagation();
        if (window.confirm("確定要刪除這篇文案嗎？")) {
          setPosts(posts.filter(p => p.id !== id));
          if (form.id === id) handleClear();
        }
      };

      const handleChange = (e) => setForm({ ...form, [e.target.name]: e.target.value });

      // 過濾要顯示的貼文
      const filteredPosts = posts.filter(p => 
        (selectedProject === '全部' || p.project === selectedProject) && 
        (selectedPhase === '全部' || p.phase === selectedPhase)
      );

      return (
        <div className="max-w-7xl mx-auto p-4 flex flex-col lg:flex-row gap-6 mt-4">
          
          {/* 左側：編輯區 */}
          <div className="flex-1 flex flex-col gap-4">
            <div className="bg-white p-6 rounded-xl shadow-md border border-slate-200">
              <div className="flex justify-between items-center mb-6 border-b pb-4">
                <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                  <Edit className="text-blue-500" /> {form.id ? '編輯文案與企劃' : '新增口碑文案'}
                </h1>
                <button onClick={handleClear} className="text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded-lg flex items-center gap-1.5 font-bold text-sm transition">
                  <Plus size={16} /> 開新文案
                </button>
              </div>

              {/* 專案資料夾設定區 */}
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4 bg-slate-50 p-4 rounded-xl border border-slate-100">
                <div className="flex flex-col gap-1.5 md:col-span-2">
                  <label className="text-sm font-bold text-slate-600 flex items-center justify-between">
                    <span className="flex items-center gap-1.5"><FolderOpen size={16} className="text-slate-400" /> 主專案資料夾</span>
                    <button onClick={() => deleteProject(form.project)} className="text-xs text-red-500 hover:text-red-700 font-bold transition">
                      刪除目前專案
                    </button>
                  </label>
                  <div className="flex flex-wrap sm:flex-nowrap gap-2">
                    <select name="project" value={form.project} onChange={handleProjectChange} className="flex-1 min-w-[120px] p-2 border rounded-lg bg-white focus:ring-2 focus:ring-blue-500 font-bold text-blue-800">
                      {Object.keys(projects).map(p => <option key={p} value={p}>{p}</option>)}
                    </select>
                    <input type="text" value={newProjectName} onChange={(e) => setNewProjectName(e.target.value)} placeholder="新專案名" className="flex-1 min-w-[120px] p-2 border rounded-lg bg-white focus:ring-2 focus:ring-blue-500"/>
                    <button onClick={addProject} className="w-full sm:w-auto px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-800 rounded-lg font-bold text-sm transition whitespace-nowrap">新增</button>
                  </div>
                </div>

                <div className="flex flex-col gap-1.5 md:col-span-2">
                  <label className="text-sm font-bold text-slate-600 flex items-center justify-between">
                    <span className="flex items-center gap-1.5"><Folder size={16} className="text-slate-400" /> 子資料夾 (階段)</span>
                    <button onClick={() => deletePhase(form.project, form.phase)} className="text-xs text-red-500 hover:text-red-700 font-bold transition">
                      刪除此階段
                    </button>
                  </label>
                  <div className="flex flex-wrap sm:flex-nowrap gap-2">
                    <select name="phase" value={form.phase} onChange={handleChange} className="flex-1 min-w-[120px] p-2 border rounded-lg bg-white focus:ring-2 focus:ring-purple-500 font-bold text-purple-700">
                      {projects[form.project]?.map(p => <option key={p} value={p}>{p}</option>)}
                    </select>
                    <input type="text" value={newPhaseName} onChange={(e) => setNewPhaseName(e.target.value)} placeholder="新階段名" className="flex-1 min-w-[120px] p-2 border rounded-lg bg-white focus:ring-2 focus:ring-purple-500"/>
                    <button onClick={addPhase} className="w-full sm:w-auto px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-800 rounded-lg font-bold text-sm transition whitespace-nowrap">新增</button>
                  </div>
                </div>
              </div>

              {/* 文章詳細設定區 */}
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <div className="flex flex-col gap-1.5">
                  <label className="text-sm font-bold text-slate-600">發布月份</label>
                  <input type="number" name="month" value={form.month} onChange={handleChange} placeholder="例: 7" className="p-2 border rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none"/>
                </div>
                <div className="flex flex-col gap-1.5">
                  <label className="text-sm font-bold text-slate-600">發布日期</label>
                  <input type="date" name="publishDate" value={form.publishDate} onChange={handleChange} className="p-2 border rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none"/>
                </div>
                <div className="flex flex-col gap-1.5">
                  <label className="text-sm font-bold text-slate-600">文章編號</label>
                  <input type="text" name="articleNo" value={form.articleNo} onChange={handleChange} placeholder="例: P-001" className="p-2 border rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none"/>
                </div>
                
                <div className="flex flex-col gap-1.5">
                  <label className="text-sm font-bold text-slate-600">發布平台</label>
                  <select name="platform" value={form.platform} onChange={handleChange} className="p-2 border rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                    <option value="Dcard">Dcard</option>
                    <option value="Mobile01">Mobile01</option>
                    <option value="Threads">Threads</option>
                  </select>
                </div>
                <div className="flex flex-col gap-1.5 md:col-span-2">
                  <label className="text-sm font-bold text-slate-600">版別</label>
                  <input name="board" value={form.board} onChange={handleChange} placeholder="例: 美妝版" className="p-2 border rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none"/>
                </div>
              </div>

              {/* 標題與內文 */}
              <div className="flex flex-col gap-2 mb-4">
                <div className="flex justify-between items-end">
                  <label className="text-sm font-bold text-slate-600">文章標題</label>
                  <button onClick={handleGenerateTitle} disabled={loadingType === 'title'} className="text-xs bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-full font-bold flex items-center gap-1.5 hover:bg-indigo-200 transition">
                    {loadingType === 'title' ? <Loader2 size={14} className="animate-spin" /> : <Sparkles size={14} />} AI 生成標題
                  </button>
                </div>
                <input name="title" value={form.title} onChange={handleChange} placeholder="請輸入標題..." className="p-3 border rounded-lg bg-slate-50 text-lg font-bold focus:ring-2 focus:ring-blue-500 outline-none"/>
              </div>

              <div className="flex flex-col gap-2 mb-4">
                <div className="flex justify-between items-end">
                  <label className="text-sm font-bold text-slate-600">文案內容</label>
                  <button onClick={handleTypoCheck} disabled={loadingType === 'typo'} className="text-xs bg-purple-100 text-purple-700 px-3 py-1.5 rounded-full font-bold flex items-center gap-1.5 hover:bg-purple-200 transition">
                    {loadingType === 'typo' ? <Loader2 size={14} className="animate-spin" /> : <Wand2 size={14} />} AI 錯字校正
                  </button>
                </div>
                <textarea ref={textareaRef} name="content" value={form.content} onChange={handleChange} placeholder="請輸入貼文內容..." className="p-4 border rounded-lg bg-slate-50 min-h-[150px] resize-y focus:ring-2 focus:ring-blue-500 outline-none custom-scrollbar text-[15px] leading-relaxed"></textarea>
                
                {/* 字數統計 */}
                <div className="text-right">
                  <span className={`text-xs font-bold px-2.5 py-1 rounded-md ${pureCount > 0 ? 'bg-blue-100 text-blue-700' : 'bg-slate-200 text-slate-500'}`}>
                    純字數：{pureCount} 字
                  </span>
                </div>
              </div>

              {/* 錯字檢查結果 */}
              {checkError && <div className="mb-4 text-red-600 text-sm font-bold">{checkError}</div>}
              {typos !== null && !loadingType && (
                <div className="mb-6 p-4 bg-slate-50 border rounded-xl">
                  {typos.length === 0 ? <div className="text-green-600 font-bold flex items-center gap-2"><CheckCircle size={18}/> 無錯字，太棒了！</div> : 
                    <div>
                      <div className="text-orange-600 font-bold text-sm mb-3 flex items-center gap-2"><AlertCircle size={18}/> 發現 {typos.length} 個建議：</div>
                      {typos.map((t, idx) => (
                        <div key={idx} className="flex flex-col sm:flex-row justify-between sm:items-center bg-white p-3 mb-2 rounded-lg border shadow-sm text-sm gap-2">
                          <div>
                            <span className="line-through text-red-500 mr-2 bg-red-50 px-1 rounded">{t.wrong}</span> → 
                            <span className="text-green-600 font-bold ml-2 bg-green-50 px-1 rounded">{t.correct}</span> 
                            <span className="text-slate-500 ml-2 text-xs">({t.reason})</span>
                          </div>
                          <button onClick={() => applyFix(t.wrong, t.correct, idx)} className="text-green-700 font-bold bg-green-100 hover:bg-green-200 px-3 py-1 rounded-md transition self-start sm:self-auto">套用</button>
                        </div>
                      ))}
                    </div>
                  }
                </div>
              )}

              {/* 留言區 */}
              <div className="flex flex-col gap-2 mb-6 border-t border-slate-100 pt-6">
                <label className="text-sm font-bold text-slate-600">預設留言 (可直接貼上多樓層內容)</label>
                <textarea name="comments" value={form.comments} onChange={handleChange} placeholder="第一樓留言...\n第二樓留言..." className="p-3 border rounded-lg bg-slate-50 min-h-[100px] resize-y focus:ring-2 focus:ring-blue-500 outline-none custom-scrollbar text-sm"></textarea>
              </div>

              {/* 企劃區 */}
              <div className="flex flex-col gap-2 mb-6 border-t border-slate-100 pt-6 bg-amber-50/50 p-4 rounded-xl">
                <div className="flex justify-between items-end mb-1">
                  <label className="text-sm font-bold text-amber-800 flex items-center gap-1.5"><Sparkles size={16}/> 企劃方向 (客戶用)</label>
                  <button onClick={handleGeneratePlan} disabled={loadingType === 'plan'} className="text-xs bg-amber-200 text-amber-800 px-3 py-1.5 rounded-full font-bold flex items-center gap-1.5 hover:bg-amber-300 transition shadow-sm">
                    {loadingType === 'plan' ? <Loader2 size={14} className="animate-spin" /> : <Wand2 size={14} />} AI 自動萃取
                  </button>
                </div>
                <textarea ref={planTextareaRef} name="plan" value={form.plan} onChange={handleChange} placeholder="1. 主文方向... 2. 回文方向..." className="p-4 border border-amber-200 rounded-lg bg-white min-h-[100px] resize-y focus:ring-2 focus:ring-amber-400 outline-none custom-scrollbar font-mono text-sm leading-relaxed"></textarea>
              </div>

              <button onClick={handleSave} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-lg py-3.5 rounded-xl flex justify-center items-center gap-2 transition shadow-lg">
                <Save size={20} /> {form.id ? '儲存修改' : '儲存文案'}
              </button>
            </div>
          </div>

          {/* 右側：文案庫清單與資料夾導航 */}
          <div className="w-full lg:w-[400px] flex flex-col gap-4">
            <div className="bg-slate-800 rounded-xl shadow-lg border border-slate-700 flex flex-col h-[85vh] overflow-hidden">
              
              {/* 資料夾導覽 */}
              <div className="flex flex-col flex-shrink-0 bg-slate-900 border-b border-slate-700">
                
                {/* 第一層：主專案 Tabs */}
                <div className="flex overflow-x-auto custom-scrollbar p-2 gap-1.5 border-b border-slate-800">
                  <div 
                    onClick={() => { setSelectedProject('全部'); setSelectedPhase('全部'); }}
                    className={`cursor-pointer px-4 py-2 rounded-lg text-sm font-bold whitespace-nowrap transition ${selectedProject === '全部' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                  >
                    全部專案
                  </div>
                  {Object.keys(projects).map(projName => (
                    <div 
                      key={projName}
                      onClick={() => { setSelectedProject(projName); setSelectedPhase('全部'); }}
                      className={`cursor-pointer px-4 py-2 rounded-lg text-sm font-bold whitespace-nowrap flex items-center gap-2 transition ${selectedProject === projName ? 'bg-slate-700 text-white border border-slate-600 shadow-inner' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                    >
                      <Folder size={14} className={selectedProject === projName ? 'text-blue-400' : ''} /> {projName}
                    </div>
                  ))}
                </div>

                {/* 第二層：階段 Tabs */}
                {selectedProject !== '全部' && (
                  <div className="flex overflow-x-auto custom-scrollbar p-2 gap-1.5 bg-slate-800/80">
                    <div 
                      onClick={() => setSelectedPhase('全部')}
                      className={`cursor-pointer px-3 py-1.5 rounded-md text-xs font-bold whitespace-nowrap transition ${selectedPhase === '全部' ? 'bg-purple-600 text-white shadow-sm' : 'text-slate-400 hover:bg-slate-700 hover:text-white'}`}
                    >
                      全部階段
                    </div>
                    {projects[selectedProject]?.map(phaseName => (
                      <div 
                        key={phaseName}
                        onClick={() => setSelectedPhase(phaseName)}
                        className={`cursor-pointer px-3 py-1.5 rounded-md text-xs font-bold whitespace-nowrap flex items-center gap-1.5 transition ${selectedPhase === phaseName ? 'bg-purple-900/80 text-purple-100 border border-purple-500/50 shadow-inner' : 'text-slate-400 hover:bg-slate-700 hover:text-white'}`}
                      >
                        {phaseName}
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* 文案列表 */}
              <div className="p-4 flex-1 overflow-y-auto custom-scrollbar bg-slate-800">
                <div className="flex items-center justify-between mb-4 text-slate-300">
                  <h3 className="font-bold flex items-center gap-2"><LayoutList size={18}/> 文案庫列表</h3>
                  <span className="text-xs font-bold bg-slate-700 px-2.5 py-1 rounded-full">{filteredPosts.length} 篇</span>
                </div>

                {filteredPosts.length === 0 ? (
                  <div className="text-center text-slate-500 py-12 mt-4 flex flex-col items-center gap-3">
                    <FileText size={48} className="opacity-40" />
                    <p className="font-bold">此分類尚無文案</p>
                  </div>
                ) : (
                  <div className="space-y-3">
                    {filteredPosts.map(post => (
                      <div key={post.id} onClick={() => handleEdit(post)} className="bg-slate-700 hover:bg-slate-600 border border-slate-600 hover:border-blue-500 rounded-xl p-4 cursor-pointer transition shadow-sm group">
                        
                        <div className="flex justify-between items-start mb-2">
                          <div className="flex flex-wrap gap-1.5">
                            <span className={`text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider ${
                              post.platform === 'Dcard' ? 'bg-[#006aa6] text-white' : 
                              post.platform === 'Mobile01' ? 'bg-[#86c12c] text-white' : 
                              'bg-gray-900 text-white'
                            }`}>
                              {post.platform}
                            </span>
                            {post.project && selectedProject === '全部' && <span className="bg-slate-800 text-blue-300 px-2 py-0.5 rounded text-[10px] font-bold border border-slate-700">{post.project}</span>}
                          </div>
                          <button onClick={(e) => handleDelete(post.id, e)} className="text-slate-400 hover:text-red-400 transition p-1 bg-slate-800/50 rounded hover:bg-slate-800">
                            <Trash2 size={14} />
                          </button>
                        </div>
                        
                        <h4 className="font-bold text-white text-[15px] mb-2 line-clamp-1">{post.title || '無標題'}</h4>
                        
                        <div className="flex flex-wrap gap-x-3 gap-y-1 text-xs text-slate-400 mb-2 font-medium">
                          {post.publishDate && <span>📅 {post.publishDate}</span>}
                          {post.board && <span>📍 {post.board}</span>}
                          {post.articleNo && <span>#️⃣ {post.articleNo}</span>}
                        </div>
                        
                        <p className="text-slate-300 text-xs line-clamp-2 bg-slate-800/80 p-2.5 rounded-lg border border-slate-700/50 leading-relaxed mb-2">
                          {post.content || '無內容'}
                        </p>

                        {post.plan && (
                           <div className="text-[10px] text-amber-300 bg-amber-900/40 px-2 py-1 rounded inline-flex items-center gap-1 border border-amber-700/50 font-bold">
                             <Sparkles size={10} /> 內含企劃
                           </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
